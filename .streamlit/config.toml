# ══════════════════════════════════════════════════════════════════
# Anya Forger 主題：淡粉底 + 珊瑚/褐色文字階層（原版配色）。
# 曾嘗試把海報鮭魚粉(#EF8E7F)整面當畫布（drenched 策略），
# 實際使用回饋是難以閱讀，已還原成淡粉近白底。
# ══════════════════════════════════════════════════════════════════
[theme]
base = "light"
primaryColor = "#AD4746"
backgroundColor = "#FFF6F7"
secondaryBackgroundColor = "#FFDFE0"
textColor = "#4B3832"
# 連結色與實際生效值對齊（rich_styles 的珊瑚色系；加深一階使對比 ≥4.5:1）
linkColor = "#A84A40"
# 與 rich_styles 實際生效的行內程式碼底色對齊（原 #FFF2CC 從未生效）
codeBackgroundColor = "#EDE8E6"
font = "SF Pro Rounded"
codeFont = "monospace"
headingFont = "SF Pro Rounded"
baseRadius = "10px"
borderColor = "#E8D5D3"   # 帶品牌色相的暖灰（原純灰 #D3D3D3 在粉底上偏冷）
showWidgetBorder = true
baseFontSize = 16
showSidebarBorder = true

# SF Pro Display — Regular
[[theme.fontFaces]]
url = "app/static/SF-Pro-Rounded-Regular.otf"
family = "SF Pro Rounded"
weight = 400

# SF Pro Display — Medium
[[theme.fontFaces]]
url = "app/static/SF-Pro-Rounded-Medium.otf"
family = "SF Pro Rounded"
weight = 500

# SF Pro Display — Semibold（用於標題）
[[theme.fontFaces]]
url = "app/static/SF-Pro-Rounded-Semibold.otf"
family = "SF Pro Rounded"
weight = 600

# SF Pro Display — Bold
[[theme.fontFaces]]
url = "app/static/SF-Pro-Rounded-Bold.otf"
family = "SF Pro Rounded"
weight = 700

[server]
maxUploadSize = 300
enableStaticServing = true
# 明確設定 WebSocket ping 間隔（transport 層 keep-alive，防中間代理判定連線閒置逾時而砍斷
# → session_state／對話歷史整個消失）。官方文件明講：Tornado>=6.5 時設定 <30 秒反而可能
# 導致連線問題，所以取文件標示的安全下限 30 秒，而非貪心設更短。
# 與 pages/Anya_Gemma.py 的 _sleep_with_heartbeat()（應用層，切段送 UI delta）互補：
# 那個防的是「主線程長時間同步阻塞」，這個防的是「就算沒阻塞，連線本身也要有 keep-alive」。
# 參考：https://docs.streamlit.io/develop/api-reference/configuration/config.toml
#      https://github.com/streamlit/streamlit/issues/8660（Streamlit 曾有 ping frame 未確實送出的已知問題）
websocketPingInterval = 30
